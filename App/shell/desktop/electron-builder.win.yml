appId: cn.memtensor.memmy
productName: Memmy
artifactName: Memmy-${version}-${arch}.${ext}

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/sqlite-vec-*/vec0.*"
  - "dist/renderer/**"

extraResources:
  - from: dist/runtime/bin
    to: cli
    filter:
      - "**/*"
  - from: build/icon.ico
    to: icon.ico

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: true
  signExecutable: true
  forceCodeSigning: true
  signtoolOptions:
    signingHashAlgorithms:
      - sha256

nsis:
  include: build/installer-win-unsigned.nsh
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  shortcutName: Memmy
